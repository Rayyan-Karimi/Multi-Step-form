<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stepper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="mobile-header">
            <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="400" height="172"
                viewBox="0 0 375 172">
                <defs>
                    <path id="a" d="M0 0h375v172H0z" />
                </defs>
                <g fill="none" fill-rule="evenodd">
                    <mask id="b" fill="#fff">
                        <use xlink:href="#a" />
                    </mask>
                    <use xlink:href="#a" fill="#483EFF" />
                    <g mask="url(#b)">
                        <g transform="translate(-151.029 -133.957)">
                            <path fill="#6259FF"
                                d="M79.546 349.634c54.547 128.646 292.524 204.132 354.626 99.852 62.102-104.28-95.035-123.204-150.583-230.963-55.547-107.759-98.711-175.015-178.973-150.466C24.354 92.607 25 220.987 79.546 349.634Z" />
                            <ellipse cx="129.864" cy="258.711" fill="#FFAF7E" rx="96.329" ry="96.373" />
                            <path fill="#F9818E"
                                d="M464.88 433.146c87.31-40.69 133.585-206.525 60.253-246.82-73.333-40.293-82.587 68.465-155.485 109.343-72.898 40.877-118.192 72.245-99.348 126.973 18.845 54.728 107.27 51.194 194.58 10.504Z" />
                            <g stroke="#FFF" stroke-linecap="round" stroke-linejoin="bevel" stroke-width="5">
                                <path
                                    d="m367.336 243.125 15.263-15.549M430.872 251.016l-17.995-15.112M399.36 271.751l-9.94 21.293" />
                            </g>
                        </g>
                    </g>
                </g>
            </svg>
        </div>
        <div class="steps">
            <div class="step active">1</div>
            <div class="step">2</div>
            <div class="step">3</div>
            <div class="step">4</div>
            <div class="step hidden">5</div>
        </div>

    </header>
    <div class="stepper-container">
        <div class="details">
            <div class="step-detail active">
                <form action="">
                    <h3>Personal info</h3>
                    <h5 class="grey">Please provide your name, email address, and phone number.</h5>
                    <div class="personal-info">
                        <label for="name">Name</label><br>
                        <input type="text" name="name" id="name" placeholder="e.g. Stephen King">
                    </div>
                    <div class="personal-info">
                        <label for="email">Email Address</label><br>
                        <input type="email" name="email" id="email" placeholder="e.g. stephenking@lorem.com">
                    </div>
                    <div class="personal-info">
                        <label for="phone">Phone Number</label>
                        <input type="number" name="phone" id="phone" placeholder="e.g. +1 234 567 890">
                    </div>
                </form>
            </div>
            <p class="step-detail">Add shipping address for successful delivery.</p>
            <p class="step-detail">Complete Payment to complete the order.</p>
            <p class="step-detail">Ready to get delivered!</p>
            <p class="step-detail">Order delivered successfully! 🎉</p>
        </div>
    </div>
    <div class="controls">
        <button id="prev" disabled>Go Back</button>
        <button id="next">Next Step</button>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
